kind = "web"
previewPath = "/"
title = "Personal Profile"
version = "1.0.0"
id = "artifacts/personal-profile"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24340

[services.development]
run = "pnpm --filter @workspace/personal-profile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/personal-profile", "run", "build" ]
publicDir = "artifacts/personal-profile/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24340"
BASE_PATH = "/"
